on:
  workflow_call:
    inputs:
      branch_name:
        type: string
        required: true
      container_branch:
        type: string
        required: false
        default: ''
      cache_version:
        type: string
        default: '1'
      update_docker:
        description: 'JSON list of Docker image variants to update, e.g. ["release","r-devel"]'
        type: string
        default: '[]'
      use-containers:
        type: boolean
        default: true
    outputs:
      container:
        description: "Updated container path"
        value: ${{ jobs.docker.outputs.container }}
      r_devel_container:
        description: "Updated R-devel container path"
        value: ${{ jobs.docker.outputs.r_devel_container }}

permissions:
  contents: write
  pull-requests: write
  packages: write


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}


jobs:
  docker:
    name: 🐋 Update docker image and files
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      container: ${{ steps.image_job.outputs.container }}
      r_devel_container: ${{ steps.image_job.outputs.r_devel_container }}

    steps:
      - name: Dump github context
        if: ${{ inputs.update_docker != '[]' }}
        run:   echo "$GITHUB_CONTEXT"
        shell: bash
        env:
         GITHUB_CONTEXT: ${{ toJson(github) }}

      - name: ⬇️ Checkout repo
        if: ${{ inputs.update_docker != '[]' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 🔧 Configure git
        if: ${{ inputs.update_docker != '[]' }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git config --local user.name "${{ github.actor }}"
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          if [ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]; then
            # For PRs from forks
            git remote add fork ${{ github.event.pull_request.head.repo.clone_url }}
            git remote set-url fork https://x-access-token:${{ github.token }}@github.com/${{ github.event.pull_request.head.repo.full_name }}.git
            git fetch fork ${{ github.event.pull_request.head.ref }}
            git checkout -b ${{ inputs.branch_name }} fork/${{ github.event.pull_request.head.ref }}
          else
            # For PRs from the same repository
            git remote set-url origin https://$GITHUB_ACTOR:${{ secrets.GH_PAT }}@github.com/$GITHUB_REPOSITORY.git
            git switch "${{ inputs.branch_name }}"
          fi

      - name: 🔧 Resolve R-devel base image digest
        id: r_devel_base_image
        if: ${{ contains(fromJSON(inputs.update_docker), 'r-devel') }}
        run: |
          set -euo pipefail

          R_DEVEL_BASE_IMAGE="rocker/tidyverse:devel"
          R_DEVEL_BASE_DIGEST=$(docker manifest inspect "${R_DEVEL_BASE_IMAGE}" | jq -r '
            if has("manifests") then
              ([.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64") | .digest][0] // "")
            else
              (.config.digest // "")
            end
          ')

          if [ -z "${R_DEVEL_BASE_DIGEST}" ] || [ "${R_DEVEL_BASE_DIGEST}" = "null" ]; then
            echo "Could not resolve digest for ${R_DEVEL_BASE_IMAGE}"
            exit 1
          fi

          echo "Resolved ${R_DEVEL_BASE_IMAGE} to ${R_DEVEL_BASE_DIGEST}"
          echo "digest=${R_DEVEL_BASE_DIGEST}" >> $GITHUB_OUTPUT

      - name: Generate dockerfiles
        if: ${{ inputs.update_docker != '[]' }}
        run: |
          cat > dockerfile <<'DOCKERFILE'
          FROM rocker/tidyverse
          ENV TZ=Australia/Sydney
          RUN date

          # System dependencies (apt-get since r-base is debian based)
          RUN apt-get update
          RUN apt-get install -y libcurl4-gnutls-dev curl # curl files
          RUN apt-get install -y docker.io # docker interface
          RUN apt-get install -y gnupg2 # required to install odbc

          # Move pak.lock to the container
          COPY . /app/
          WORKDIR /app

          # tex packages are installed in /root/bin so we have to make sure those
          # packages accessible by adding that directory to the PATH variable.
          ENV PATH="${PATH}:/root/bin"

          RUN R -e 'install.packages("pak")'

          RUN R -e 'getwd(); dir()'

          # Remove dev package from pak.lock
          RUN R -e 'pak::pak("jsonlite"); d <- jsonlite::read_json("pak.lock"); d$packages <- Filter(\(x) x$package != "${{ github.event.repository.name }}", d$packages); print(unlist(Map(\(x) x$package, d$packages))); jsonlite::write_json(d, "pak.lock", auto_unbox = TRUE)'

          # Install package dependencies
          RUN R -e 'pkgs <- jsonlite::fromJSON("pak.lock")$packages; pak::pak(paste0(pkgs$package, "@" ,pkgs$version))'

          # Install workflow dependencies
          RUN R -e 'pak::pak(c("jsonlite", "rcmdcheck", "devtools", "lintr", "covr", "roxygen2", "pkgdown", "rmarkdown", "styler"))'

          # Install the dev package
          RUN R -e 'devtools::install()'
          DOCKERFILE

          cat > dockerfile-r-devel <<'DOCKERFILE'
          FROM rocker/tidyverse:devel
          ENV TZ=Australia/Sydney
          RUN date

          # System dependencies (apt-get since r-base is debian based)
          RUN apt-get update
          RUN apt-get install -y libcurl4-gnutls-dev curl # curl files
          RUN apt-get install -y docker.io # docker interface
          RUN apt-get install -y gnupg2 # required to install odbc

          # Move pak.lock to the container
          COPY . /app/
          WORKDIR /app

          # tex packages are installed in /root/bin so we have to make sure those
          # packages accessible by adding that directory to the PATH variable.
          ENV PATH="${PATH}:/root/bin"

          RUN R -e 'install.packages("pak")'

          RUN R -e 'getwd(); dir()'

          # Remove dev package from pak.lock
          RUN R -e 'pak::pak("jsonlite"); d <- jsonlite::read_json("pak.lock"); d$packages <- Filter(\(x) x$package != "${{ github.event.repository.name }}", d$packages); print(unlist(Map(\(x) x$package, d$packages))); jsonlite::write_json(d, "pak.lock", auto_unbox = TRUE)'

          # Install package dependencies
          RUN R -e 'pkgs <- jsonlite::fromJSON("pak.lock")$packages; pak::pak(paste0(pkgs$package, "@" ,pkgs$version))'

          # Install workflow dependencies
          RUN R -e 'pak::pak(c("jsonlite", "rcmdcheck", "devtools", "lintr", "covr", "roxygen2", "pkgdown", "rmarkdown", "styler"))'

          # Install the dev package
          RUN R -e 'devtools::install()'
          DOCKERFILE

          if echo '${{ inputs.update_docker }}' | jq -e 'index("r-devel")' > /dev/null; then
            mkdir -p .github
            printf '%s\n' '${{ steps.r_devel_base_image.outputs.digest }}' > .github/r-devel-base-digest
            echo "Recorded R-devel base image digest: $(cat .github/r-devel-base-digest)"
          fi

          cat dockerfile
          cat dockerfile-r-devel

      - name: ⬆️ Commit changes
        if: ${{ inputs.update_docker != '[]' }}
        run: |
          git stash --include-untracked

          if [ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]; then
            # For PRs from forks - use the fork's URL and the GITHUB_TOKEN
            git pull --rebase fork ${{ github.event.pull_request.head.ref }}
          else
            # For PRs from the same repository
            git pull --rebase origin ${{ inputs.branch_name }}
          fi

          git stash list | grep stash@{0} && git stash pop || echo "No stash to pop"
          git add dockerfile dockerfile-r-devel
          git add .github/r-devel-base-digest 2>/dev/null || true
          git commit -m "chore: Update Docker specifications" || echo "No changes to commit"

      - name: 🐋 Log in to the Container registry
        if: ${{ inputs.update_docker != '[]' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐋 Extract metadata (tags, labels) for Docker
        if: ${{ inputs.update_docker != '[]' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: ⚙️ Generate image tag
        id: tag
        run: |
          # Convert IMAGE_NAME to lowercase
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')

          CONTAINER_BRANCH="${{ inputs.container_branch }}"
          if [ -z "${CONTAINER_BRANCH}" ]; then
            CONTAINER_BRANCH="${{ inputs.branch_name }}"
          fi

          # Replace / with - in BRANCH_TAG
          BRANCH_TAG_CLEAN=$(echo "${CONTAINER_BRANCH}" | tr '/' '-')

          IMAGE="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}:${BRANCH_TAG_CLEAN}"
          R_DEVEL_IMAGE="${IMAGE}-r-devel"

          echo "Generated image reference is: ${IMAGE}"
          echo "Generated R-devel image reference is: ${R_DEVEL_IMAGE}"
          echo "tag=${IMAGE}" >> $GITHUB_OUTPUT
          echo "r_devel_tag=${R_DEVEL_IMAGE}" >> $GITHUB_OUTPUT

      - name: 🔧 Build and push Docker image
        if: ${{ contains(fromJSON(inputs.update_docker), 'release') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          push: true
          tags: ${{ steps.tag.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: 🔧 Build and push R-devel Docker image
        if: ${{ contains(fromJSON(inputs.update_docker), 'r-devel') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile-r-devel
          push: true
          tags: ${{ steps.tag.outputs.r_devel_tag }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            dk.ssi.ci.r-devel-base-image=rocker/tidyverse:devel
            dk.ssi.ci.r-devel-base-digest=${{ steps.r_devel_base_image.outputs.digest }}

      - name: 🔍 Check if Docker images exist in GHCR
        id: image_job
        if: ${{ !cancelled() }}
        run: |
          IMAGE="${{ steps.tag.outputs.tag }}"
          R_DEVEL_IMAGE="${{ steps.tag.outputs.r_devel_tag }}"

          echo "Checking for image: ${IMAGE}"
          echo "Checking for R-devel image: ${R_DEVEL_IMAGE}"

          # Try to pull the image metadata (doesn't download full image)
          if [[ "${{ inputs.use-containers }}" == "false" ]]; then
            echo "Use of containers is disabled"
            echo "container=null" >> $GITHUB_OUTPUT
            echo "r_devel_container=null" >> $GITHUB_OUTPUT
          else
            if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "Image found in GHCR"
              printf 'container="%s"\n' "${IMAGE}" >> $GITHUB_OUTPUT
            else
              echo "Image not found in GHCR"
              echo "container=null" >> $GITHUB_OUTPUT
            fi

            if docker manifest inspect "${R_DEVEL_IMAGE}" > /dev/null 2>&1; then
              echo "R-devel image found in GHCR"
              printf 'r_devel_container="%s"\n' "${R_DEVEL_IMAGE}" >> $GITHUB_OUTPUT
            else
              echo "R-devel image not found in GHCR"
              echo "r_devel_container=null" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 🚀 Push changes
        if: ${{ !cancelled() && inputs.update_docker != '[]' }}
        run: |
          set -o xtrace

          if [ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]; then
            # For PRs from forks - use the fork's URL and the GITHUB_TOKEN
            git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.event.pull_request.head.repo.owner.login }}/${{ github.event.pull_request.head.repo.name }}.git HEAD:${{ github.event.pull_request.head.ref }}
          else
            # For PRs from the same repository
            git push origin ${{ inputs.branch_name }}
          fi
