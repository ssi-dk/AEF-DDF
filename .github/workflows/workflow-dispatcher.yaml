on:
  workflow_call:
    inputs:
      skip:
        required: false
        type: string
        default: 'styler,regenerate-data'
      main_branches:
        required: false
        type: string
        default: 'main,master'
      use-containers:
        required: false
        type: boolean
        default: true

      event_name:
        required: true
        type: string
      run_id:
        required: true
        type: string

      rcmdcheck_args:
        required: false
        type: string
        default: 'c("--no-manual", "--as-cran", "--no-tests")'

      schemas:
        required: false
        type: string
      backend_exclude:
        required: false
        type: string
      check_postgres_logs:
        required: false
        type: boolean
        default: true
      auto_link_r6:
        required: false
        type: boolean
        default: true


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # To give granular control of when workflows should execute, we determine which "categories" of files has changed
  trigger:
    name: ⚙️ Determine downstream workflow triggers
    runs-on: ubuntu-latest

    outputs:
      on_main_branch: ${{ steps.main_branch_affected.outputs.on_main_branch }}
      main_branch_affected: ${{ steps.main_branch_affected.outputs.main_branch_affected }}
      branch_name: ${{ steps.branch_name.outputs.branch_name }}
      cache_version: ${{ steps.cache_version.outputs.cache_version }}
      min_r_version: ${{ steps.min_r_version.outputs.min_R_version }}
      r_devel_base_digest_changed: ${{ steps.changed-files-yaml.outputs.r_devel_base_digest_any_changed }}


      lint: ${{
        !contains(inputs.skip, 'lint') &&
        (
          inputs.event_name == 'workflow_dispatch' ||
          steps.main_branch_affected.outputs.on_main_branch == 'true' ||
          (
            steps.changed-files-yaml.outputs.R_any_changed == 'true' ||
            steps.changed-files-yaml.outputs.test_any_changed == 'true' ||
            steps.changed-files-yaml.outputs.man_any_changed == 'true' ||
            steps.changed-files-yaml.outputs.vignette_any_changed == 'true' ||
            steps.changed-files-yaml.outputs.lintr_any_changed == 'true'
          )
        ) }}

      spell-checker: ${{
        !contains(inputs.skip, 'spell-checker') &&
        (
          inputs.event_name == 'workflow_dispatch' ||
          steps.main_branch_affected.outputs.on_main_branch == 'true' ||
          (
            steps.changed-files-yaml.outputs.description_any_changed == 'true' ||
            steps.changed-files-yaml.outputs.man_any_changed == 'true' ||
            steps.changed-files-yaml.outputs.vignette_any_changed == 'true'
          )
        ) }}

      R-CMD-check: ${{
        !contains(inputs.skip, 'R-CMD-check') &&
        (
          inputs.event_name == 'workflow_dispatch' ||
          inputs.event_name == 'release' ||
          steps.main_branch_affected.outputs.on_main_branch == 'true' ||
          (
            steps.main_branch_affected.outputs.main_branch_affected == 'true' &&
            (
              steps.changed-files-yaml.outputs.R_any_changed == 'true' ||
              steps.changed-files-yaml.outputs.test_any_changed == 'true' ||
              steps.changed-files-yaml.outputs.description_any_changed == 'true' ||
              steps.changed-files-yaml.outputs.man_any_changed == 'true' ||
              steps.changed-files-yaml.outputs.vignette_any_changed == 'true'
            )
          )
        ) }}

      code-coverage: ${{
        !contains(inputs.skip, 'code-coverage') &&
        (
          inputs.event_name == 'workflow_dispatch' ||
          inputs.event_name == 'release' ||
          steps.main_branch_affected.outputs.on_main_branch == 'true' ||
          (
            steps.main_branch_affected.outputs.main_branch_affected == 'true' &&
            (
              steps.changed-files-yaml.outputs.R_any_changed == 'true' ||
              steps.changed-files-yaml.outputs.test_any_changed == 'true' ||
              steps.changed-files-yaml.outputs.description_any_changed == 'true'
            )
          )
        ) }}

      styler: ${{
        !contains(inputs.skip, 'styler') &&
        ( inputs.event_name == 'workflow_dispatch' || inputs.event_name != 'release' )
        }}

      document: ${{
        !contains(inputs.skip, 'document') &&
        (
          inputs.event_name == 'workflow_dispatch' ||
          (
            inputs.event_name != 'release' &&
            (
              steps.main_branch_affected.outputs.on_main_branch == 'true' ||
              steps.changed-files-yaml.outputs.R_any_changed == 'true' ||
              steps.changed-files-yaml.outputs.description_any_changed == 'true'
            )
          )
        ) }}

      render-readme: ${{
        !contains(inputs.skip, 'render-readme') &&
        (
          inputs.event_name == 'workflow_dispatch' ||
          (
            inputs.event_name != 'release' &&
            (
              steps.main_branch_affected.outputs.main_branch_affected == 'true' ||
              needs.trigger.outputs.readme_any_changed == 'true'
            )
          )
        ) }}

      pkgdown: ${{
        !contains(inputs.skip, 'pkgdown') &&
        (
          inputs.event_name == 'workflow_dispatch' ||
          inputs.event_name == 'release' ||
          steps.main_branch_affected.outputs.on_main_branch == 'true' ||
          (
            steps.main_branch_affected.outputs.main_branch_affected == 'true' &&
            (
              steps.changed-files-yaml.outputs.R_any_changed == 'true' ||
              steps.changed-files-yaml.outputs.description_any_changed == 'true' ||
              steps.changed-files-yaml.outputs.man_any_changed == 'true' ||
              steps.changed-files-yaml.outputs.vignette_any_changed == 'true'
            )
          )
        ) }}

      update-lockfile: ${{
        !contains(inputs.skip, 'update-lockfile') &&
        (
          inputs.event_name == 'workflow_dispatch' ||
          (
            inputs.event_name != 'release' &&
            (
              steps.main_branch_affected.outputs.on_main_branch == 'true' ||
              (
                steps.main_branch_affected.outputs.main_branch_affected == 'true' &&
                (
                  steps.changed-files-yaml.outputs.R_any_changed == 'true' ||
                  steps.changed-files-yaml.outputs.test_any_changed == 'true' ||
                  steps.changed-files-yaml.outputs.description_any_changed == 'true'
                )
              )
            )
          )
        ) }}

      update-cache: ${{
        !contains(inputs.skip, 'update-cache') &&
        (
          inputs.event_name == 'workflow_dispatch' ||
          (
            inputs.event_name != 'release' &&
            (
              steps.main_branch_affected.outputs.on_main_branch == 'true' ||
              (
                steps.main_branch_affected.outputs.main_branch_affected == 'true' &&
                (
                  steps.changed-files-yaml.outputs.R_any_changed == 'true' ||
                  steps.changed-files-yaml.outputs.vignette_any_changed == 'true'
                )
              )
            )
          )
        ) }}

      regenerate-data: ${{
        !contains(inputs.skip, 'regenerate-data') &&
        (
          inputs.event_name == 'workflow_dispatch' ||
          (
            inputs.event_name != 'release' &&
            (
              steps.main_branch_affected.outputs.on_main_branch == 'true' ||
              (
                steps.main_branch_affected.outputs.main_branch_affected == 'true' &&
                (
                  steps.changed-files-yaml.outputs.R_any_changed == 'true'
                )
              )
            )
          )
        ) }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changes to R/, tests/, man/, vignettes/, README.Rmd and DESCRIPTION
        id: changed-files-yaml
        uses: tj-actions/changed-files@v46
        with:
          files_yaml: |
            R:
              - R/**
              - data-raw/**
            test:
              - tests/**
            man:
              - man/**
            vignette:
              - vignettes/**
            readme:
              - README.md
              - README.Rmd
              - .github/templates/README_template.Rmd
            description:
              - DESCRIPTION
            lintr:
              - .lintr*
            r_devel_base_digest:
              - .github/r-devel-base-digest

      - name: Determine branch name
        id: branch_name
        shell: bash
        run: |
          echo "branch_name=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT

      - name: Determine main branch involvement
        id: main_branch_affected
        shell: bash
        run: |
          if [ "${{ inputs.event_name }}" == "pull_request" ] && [[ "${{ inputs.main_branches }}" == *"$GITHUB_BASE_REF"* ]]; then
            # Pull request event to a main branch
            echo "main_branch_affected=true" >> $GITHUB_OUTPUT
            echo "on_main_branch=false" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.event_name }}" != "pull_request" ] && [[ "${{ inputs.main_branches }}" == *"$GITHUB_REF_NAME"* ]]; then
            # Non pull request event to a main branch
            echo "main_branch_affected=true" >> $GITHUB_OUTPUT
            echo "on_main_branch=true" >> $GITHUB_OUTPUT
          else
            # All other cases
            echo "main_branch_affected=false" >> $GITHUB_OUTPUT
            echo "on_main_branch=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine R version requirement in DESCRIPTION
        id: min_r_version
        run: |
          min_R_version=$(awk '/R \(>= / {match($0, /R \(>= ([0-9]+\.[0-9]+(\.[0-9]+)?)/, arr); print arr[1]}' DESCRIPTION)
          echo "min_R_version=${min_R_version}" >> $GITHUB_OUTPUT

      - name: Invalidate cache on workflow_dispatch
        id: cache_version
        shell: bash
        run: |
          if [ "${{ inputs.event_name }}" == "workflow_dispatch" ] ; then
            echo "cache_version=0" >> $GITHUB_OUTPUT
          else
            echo "cache_version=1" >> $GITHUB_OUTPUT
          fi

      - name: Report triggers
        run: |
          echo "R/ directory changes: ${{ steps.changed-files-yaml.outputs.R_any_changed }}"
          echo "tests/ directory changes: ${{ steps.changed-files-yaml.outputs.test_any_changed }}"
          echo "man/ directory changes: ${{ steps.changed-files-yaml.outputs.man_any_changed }}"
          echo "vignettes/ directory changes: ${{ steps.changed-files-yaml.outputs.vignette_any_changed }}"
          echo "README.Rmd changed: ${{ steps.changed-files-yaml.outputs.readme_any_changed }}"
          echo "DESCRIPTION changed: ${{ steps.changed-files-yaml.outputs.description_any_changed }}"
          echo "lintr files changed: ${{ steps.changed-files-yaml.outputs.lintr_any_changed }}"
          echo "R-devel base digest changed: ${{ steps.changed-files-yaml.outputs.r_devel_base_digest_any_changed }}"
          echo "main branch affected: ${{ steps.main_branch_affected.outputs.main_branch_affected }}"
          echo "branch name: ${{ steps.branch_name.outputs.branch_name }}"
          echo "cache_version: ${{ steps.cache_version.outputs.cache_version }}"
          echo "R version requirement: ${{ steps.min_r_version.outputs.min_R_version }}"


  inspect-trigger-output:
    needs: trigger
    name: 🐞 Inspect trigger output
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "main_branch_affected: ${{ needs.trigger.outputs.main_branch_affected }}"
          echo "branch_name: ${{ needs.trigger.outputs.branch_name }}"
          echo "cache_version: ${{ needs.trigger.outputs.cache_version }}"
          echo "min_r_version: ${{ needs.trigger.outputs.min_r_version }}"
          echo "r_devel_base_digest_changed: ${{ needs.trigger.outputs.r_devel_base_digest_changed }}"
          echo "lint: ${{ needs.trigger.outputs.lint }}"
          echo "spell-checker: ${{ needs.trigger.outputs.spell-checker }}"
          echo "R-CMD-check: ${{ needs.trigger.outputs.R-CMD-check }}"
          echo "code-coverage: ${{ needs.trigger.outputs.code-coverage }}"
          echo "styler: ${{ needs.trigger.outputs.styler }}"
          echo "document: ${{ needs.trigger.outputs.document }}"
          echo "render-readme: ${{ needs.trigger.outputs.render-readme }}"
          echo "pkgdown: ${{ needs.trigger.outputs.pkgdown }}"
          echo "update-lockfile: ${{ needs.trigger.outputs.update-lockfile }}"
          echo "update-cache: ${{ needs.trigger.outputs.update-cache }}"
          echo "regenerate-data: ${{ needs.trigger.outputs.regenerate-data }}"


  ghcr:
    needs: trigger
    name: 🔍 Check if Docker image exists in GHCR
    runs-on: ubuntu-latest
    outputs:
      container: ${{ steps.image_job.outputs.container }}
      r_devel_container: ${{ steps.image_job.outputs.r_devel_container }}
      update_docker: ${{ steps.image_job.outputs.update_docker }}
    steps:
      - name: Determine containers to send to workflows
        id: image_job
        run: |
          # Convert IMAGE_NAME to lowercase
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')

          # Replace / with - in BRANCH_TAG
          BRANCH_TAG_CLEAN=$(echo "${{ needs.trigger.outputs.branch_name }}" | tr '/' '-')

          IMAGE="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}:${BRANCH_TAG_CLEAN}"
          R_DEVEL_IMAGE="${IMAGE}-r-devel"

          echo "Checking for image: ${IMAGE}"
          echo "Checking for R-devel image: ${R_DEVEL_IMAGE}"

          # Try to pull the image metadata (doesn't download full image)
          if [[ "${{ inputs.use-containers }}" == "false" ]]; then
            echo "Use of containers is disabled"
            echo "container=null" >> $GITHUB_OUTPUT
            echo "r_devel_container=null" >> $GITHUB_OUTPUT
            echo "update_docker=[]" >> $GITHUB_OUTPUT
          else
            UPDATE_DOCKER=()

            if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "Image found in GHCR"
              printf 'container="%s"\n' "${IMAGE}" >> $GITHUB_OUTPUT
            else
              echo "Image not found in GHCR"
              echo "container=null" >> $GITHUB_OUTPUT
              UPDATE_DOCKER+=("release")
            fi

            if docker manifest inspect "${R_DEVEL_IMAGE}" > /dev/null 2>&1; then
              echo "R-devel image found in GHCR"
              printf 'r_devel_container="%s"\n' "${R_DEVEL_IMAGE}" >> "$GITHUB_OUTPUT"
            else
              echo "R-devel image not found in GHCR"
              echo "r_devel_container=null" >> $GITHUB_OUTPUT
              UPDATE_DOCKER+=("r-devel")
            fi

            if [ ${#UPDATE_DOCKER[@]} -eq 0 ]; then
              echo "update_docker=[]" >> "$GITHUB_OUTPUT"
            else
              {
                printf 'update_docker='
                printf '%s\n' "${UPDATE_DOCKER[@]}" | jq -R . | jq -sc .
              } >> "$GITHUB_OUTPUT"
            fi
          fi


  r-devel-base-image:
    needs: trigger
    name: 🔍 Check R-devel base image digest
    runs-on: ubuntu-latest
    outputs:
      update_docker: ${{ steps.r_devel_base_image.outputs.update_docker }}
      digest: ${{ steps.r_devel_base_image.outputs.digest }}
    steps:
      - uses: actions/checkout@v5
        if: ${{ inputs.use-containers }}
        with:
          fetch-depth: 0

      - name: Compare R-devel base image digest
        id: r_devel_base_image
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ inputs.use-containers }}" == "false" ]]; then
            echo "Use of containers is disabled"
            echo "digest=" >> "$GITHUB_OUTPUT"
            echo "update_docker=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          R_DEVEL_BASE_IMAGE="rocker/tidyverse:devel"
          CURRENT_DIGEST=$(docker manifest inspect "${R_DEVEL_BASE_IMAGE}" | jq -r '
            if has("manifests") then
              ([.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64") | .digest][0] // "")
            else
              (.config.digest // "")
            end
          ')

          if [ -z "${CURRENT_DIGEST}" ] || [ "${CURRENT_DIGEST}" = "null" ]; then
            echo "Could not resolve digest for ${R_DEVEL_BASE_IMAGE}"
            exit 1
          fi

          STORED_DIGEST=""
          if [ -f .github/r-devel-base-digest ]; then
            STORED_DIGEST=$(tr -d '[:space:]' < .github/r-devel-base-digest)
          fi

          echo "Current ${R_DEVEL_BASE_IMAGE} digest: ${CURRENT_DIGEST}"
          echo "Stored ${R_DEVEL_BASE_IMAGE} digest: ${STORED_DIGEST:-<missing>}"

          if [ "${CURRENT_DIGEST}" != "${STORED_DIGEST}" ] || [ "${{ needs.trigger.outputs.r_devel_base_digest_changed }}" = "true" ]; then
            echo "R-devel image should be rebuilt"
            echo 'update_docker=["r-devel"]' >> "$GITHUB_OUTPUT"
          else
            echo "R-devel base digest is unchanged"
            echo "update_docker=[]" >> "$GITHUB_OUTPUT"
          fi

          echo "digest=${CURRENT_DIGEST}" >> "$GITHUB_OUTPUT"


  committing-workflows:
    needs: [trigger, ghcr]
    uses: ./.github/workflows/committing-workflows.yaml
    with:
      container: ${{ needs.ghcr.outputs.container }}
      branch_name: ${{ needs.trigger.outputs.branch_name }}
      cache_version: ${{ needs.trigger.outputs.cache_version }}
      styler: ${{ needs.trigger.outputs.styler == 'true' }}
      document: ${{ needs.trigger.outputs.document == 'true' }}
      render_readme: ${{ needs.trigger.outputs.render-readme == 'true' }}
      update_cache: ${{ needs.trigger.outputs.update-cache == 'true' }}
      regenerate_data: ${{ needs.trigger.outputs.regenerate-data == 'true' }}
    secrets: inherit
    concurrency:
      group: committing-workflows-${{ needs.trigger.outputs.branch_name }}
      cancel-in-progress: false


  docker-plan:
    needs: [ghcr, committing-workflows, r-devel-base-image]
    name: 🐋 Plan Docker updates
    runs-on: ubuntu-latest
    outputs:
      update_docker: ${{ steps.plan.outputs.update_docker }}
    steps:
      - name: Combine Docker update requests
        id: plan
        env:
          GHCR_UPDATE_DOCKER: ${{ needs.ghcr.outputs.update_docker }}
          COMMITTING_UPDATE_DOCKER: ${{ needs.committing-workflows.outputs.update_docker }}
          R_DEVEL_UPDATE_DOCKER: ${{ needs.r-devel-base-image.outputs.update_docker }}
        run: |
          GHCR_UPDATE_DOCKER="${GHCR_UPDATE_DOCKER:-[]}"
          COMMITTING_UPDATE_DOCKER="${COMMITTING_UPDATE_DOCKER:-[]}"
          R_DEVEL_UPDATE_DOCKER="${R_DEVEL_UPDATE_DOCKER:-[]}"

          DOCKER_VARIANTS='["release","r-devel"]'
          UPDATE_DOCKER=$(jq -cn \
            --argjson variants "${DOCKER_VARIANTS}" \
            --argjson ghcr "${GHCR_UPDATE_DOCKER}" \
            --argjson committing "${COMMITTING_UPDATE_DOCKER}" \
            --argjson rdevel "${R_DEVEL_UPDATE_DOCKER}" \
            '($ghcr + $committing + $rdevel) as $requested | $variants | map(. as $variant | select($requested | index($variant)))')

          echo "Docker image variants to update: ${UPDATE_DOCKER}"
          echo "update_docker=${UPDATE_DOCKER}" >> "$GITHUB_OUTPUT"


  docker:
    needs: [trigger, ghcr, committing-workflows, docker-plan]
    uses: ./.github/workflows/docker.yaml
    if: ${{ !cancelled() }}
    with:
      branch_name: ${{ needs.trigger.outputs.branch_name }}
      cache_version: ${{ needs.trigger.outputs.cache_version }}
      update_docker: ${{ needs.docker-plan.outputs.update_docker }}
      use-containers: ${{ inputs.use-containers }}
    secrets: inherit
    concurrency:
      group: committing-workflows-${{ needs.trigger.outputs.branch_name }}
      cancel-in-progress: false


  docker-cleanup:
    needs: [trigger, ghcr, committing-workflows]
    uses: ./.github/workflows/docker-cleanup.yaml
    if: ${{ !cancelled() }}
    secrets: inherit


  lint:
    needs: [trigger, committing-workflows, docker]
    if: ${{ needs.committing-workflows.outputs.commits_made == 'false' && needs.trigger.outputs.lint == 'true' }}
    uses: ./.github/workflows/lint.yaml
    with:
      container: ${{ needs.docker.outputs.container }}
      cache_version: ${{ needs.trigger.outputs.cache_version }}


  spell-checker:
    needs: [trigger, committing-workflows]
    if: ${{ needs.committing-workflows.outputs.commits_made == 'false'  && needs.trigger.outputs.spell-checker == 'true' }}
    uses: ./.github/workflows/spell-checker.yaml
    secrets: inherit


  R-CMD-check:
    needs: [trigger, committing-workflows, docker]
    if: ${{ needs.committing-workflows.outputs.commits_made == 'false'  && needs.trigger.outputs.R-CMD-check == 'true' }}
    uses: ./.github/workflows/R-CMD-check.yaml
    with:
      container: ${{ needs.docker.outputs.container }}
      r_devel_container: ${{ needs.docker.outputs.r_devel_container }}
      rcmdcheck_args: ${{ inputs.rcmdcheck_args }}
      cache_version: ${{ needs.trigger.outputs.cache_version }}
      min_r_version: ${{ needs.trigger.outputs.min_r_version }}
    secrets: inherit
    concurrency:
      group: R-CMD-check-${{ needs.trigger.outputs.branch_name }}
      cancel-in-progress: true


  code-coverage:
    needs: [trigger, committing-workflows, docker]
    if: ${{ needs.committing-workflows.outputs.commits_made == 'false'  && needs.trigger.outputs.code-coverage == 'true' }}
    uses: ./.github/workflows/code-coverage.yaml
    with:
      container: ${{ needs.docker.outputs.container }}
      cache_version: ${{ needs.trigger.outputs.cache_version }}
      schemas: ${{ inputs.schemas }}
      backend_exclude: ${{ inputs.backend_exclude }}
      check_postgres_logs: ${{ inputs.check_postgres_logs }}
    secrets: inherit
    concurrency:
      group: code-coverage-${{ needs.trigger.outputs.branch_name }}
      cancel-in-progress: true


  pkgdown:
    needs: [trigger, committing-workflows, docker]
    if: ${{ needs.committing-workflows.outputs.commits_made == 'false'  && needs.trigger.outputs.pkgdown == 'true' }}
    uses: ./.github/workflows/pkgdown.yaml
    with:
      container: ${{ needs.docker.outputs.container }}
      auto_link_r6: ${{ inputs.auto_link_r6 }}
      event_name: ${{ inputs.event_name }}
      main_branches: ${{ inputs.main_branches }}
      run_id: ${{ inputs.run_id }}
      cache_version: ${{ needs.trigger.outputs.cache_version }}
    secrets: inherit
    concurrency:
      group: pkgdown-${{ needs.trigger.outputs.branch_name }}${{ github.event_name == 'release' && '-release' || '' }}
      cancel-in-progress: true
